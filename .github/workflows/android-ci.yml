name: Android CI

# NOTE: `paths:` below and the artifact `path:` further down are repo-root-
# relative (GitHub Actions always resolves them that way). Only the `run:`
# steps are affected by `defaults.run.working-directory: android`.
on:
  push:
    branches: [main]
    paths:
      - "android/**"
      - ".github/workflows/android-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "android/**"
      - ".github/workflows/android-ci.yml"

concurrency:
  group: android-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    working-directory: android

jobs:
  build-and-test:
    name: Build and unit test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble debug APK and run unit tests
        run: ./gradlew assembleDebug testDebugUnitTest --stacktrace

      - name: Upload unit test reports
        # No-ops (with a warning, not a failure) if assembleDebug failed
        # before testDebugUnitTest produced any reports.
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: android/app/build/reports/tests/
          retention-days: 7
          if-no-files-found: ignore
